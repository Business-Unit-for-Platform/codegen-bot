name: codegen

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: "Target GitHub owner/org"
        required: true
        default: "FutureTechQuant"
      backend_repo:
        description: "Target backend repository"
        required: true
        default: "ruoyi-vue-pro"
      frontend_repo:
        description: "Target frontend repository"
        required: true
        default: "yudao-ui-admin-vue3"
      backend_branch:
        description: "Backend base branch"
        required: true
        default: "master-jdk17"
      frontend_branch:
        description: "Frontend base branch"
        required: true
        default: "master"
      publish_mode:
        description: "Publish mode"
        required: true
        type: choice
        default: "update_existing_repo_with_pr"
        options:
          - update_existing_repo_with_pr
          - rebuild_from_upstream
      target_private:
        description: "Create rebuilt target repos as private when publish_mode=rebuild_from_upstream"
        required: true
        type: boolean
        default: false
      codegen_engine_repo:
        description: "RuoYi/Yudao codegen engine repository"
        required: true
        default: "YunaiV/ruoyi-vue-pro"
      codegen_engine_ref:
        description: "RuoYi/Yudao codegen engine ref"
        required: true
        default: "master-jdk17"
      codegen_modules:
        description: "Optional multi-module spec, e.g. ticket:ticket_,map:map_"
        required: false
        default: ""
      codegen_module_name:
        description: "Optional single module name"
        required: false
        default: ""
      codegen_table_prefix:
        description: "Optional single module table prefix"
        required: false
        default: ""
  push:
    branches: [ master-jdk17 ]
    paths:
      - "sql/**"
      - "tools/**"
      - "templates/**"
      - ".github/workflows/codegen.yml"

permissions:
  contents: read

concurrency:
  group: codegen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gen:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      TARGET_OWNER: ${{ github.event.inputs.target_owner || 'FutureTechQuant' }}
      BACKEND_REPO: ${{ github.event.inputs.backend_repo || 'ruoyi-vue-pro' }}
      FRONTEND_REPO: ${{ github.event.inputs.frontend_repo || 'yudao-ui-admin-vue3' }}
      BACKEND_BRANCH: ${{ github.event.inputs.backend_branch || 'master-jdk17' }}
      FRONTEND_BRANCH: ${{ github.event.inputs.frontend_branch || 'master' }}
      PUBLISH_MODE: ${{ github.event.inputs.publish_mode || 'update_existing_repo_with_pr' }}
      TARGET_PRIVATE: ${{ github.event.inputs.target_private || 'false' }}
      CODEGEN_ENGINE_REPO: ${{ github.event.inputs.codegen_engine_repo || 'YunaiV/ruoyi-vue-pro' }}
      CODEGEN_ENGINE_REF: ${{ github.event.inputs.codegen_engine_ref || 'master-jdk17' }}

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=30

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Checkout ruoyi-vue-pro for codegen engine
        uses: actions/checkout@v5
        with:
          repository: ${{ env.CODEGEN_ENGINE_REPO }}
          ref: ${{ env.CODEGEN_ENGINE_REF }}
          path: ruoyi
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
          cache-dependency-path: ruoyi/pom.xml

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-client python3 redis-tools git jq tree gh

      - name: Debug workspace before run
        run: |
          set -x
          echo "github.workspace=${GITHUB_WORKSPACE}"
          echo "runner.os=${RUNNER_OS}"
          echo "pwd=$(pwd)"
          whoami
          uname -a
          java -version
          mvn -version
          python3 --version
          git --version
          jq --version
          mysql --version
          redis-cli --version || true
          echo "== codegen targets =="
          echo "TARGET_OWNER=${TARGET_OWNER}"
          echo "BACKEND_REPO=${BACKEND_REPO}"
          echo "FRONTEND_REPO=${FRONTEND_REPO}"
          echo "BACKEND_BRANCH=${BACKEND_BRANCH}"
          echo "FRONTEND_BRANCH=${FRONTEND_BRANCH}"
          echo "PUBLISH_MODE=${PUBLISH_MODE}"
          echo "CODEGEN_ENGINE_REPO=${CODEGEN_ENGINE_REPO}"
          echo "CODEGEN_ENGINE_REF=${CODEGEN_ENGINE_REF}"
          echo "== top level =="
          ls -la
          echo "== workspace tree depth 3 =="
          find "${GITHUB_WORKSPACE}" -maxdepth 3 -mindepth 1 | sort | sed -n '1,300p'
          echo "== key files =="
          ls -la "${GITHUB_WORKSPACE}/tools/codegen" || true
          ls -la "${GITHUB_WORKSPACE}/sql" || true
          ls -la "${GITHUB_WORKSPACE}/ruoyi" || true

      - name: Wait MySQL
        run: |
          for i in $(seq 1 60); do
            mysqladmin ping -h 127.0.0.1 -proot --silent && exit 0
            sleep 2
          done
          echo "MySQL not ready"
          exit 1

      - name: Wait Redis
        run: |
          for i in $(seq 1 30); do
            redis-cli -h 127.0.0.1 -p 6379 ping | grep -q PONG && exit 0
            sleep 2
          done
          echo "Redis not ready"
          exit 1

      - name: Debug services
        run: |
          set -x
          mysqladmin ping -h 127.0.0.1 -proot
          redis-cli -h 127.0.0.1 -p 6379 ping
          ss -lntp | grep -E ':3306|:6379' || true

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.TARGET_OWNER }}

      - name: Run codegen
        id: run-codegen
        env:
          MYSQL_HOST: 127.0.0.1
          MYSQL_PORT: 3306
          MYSQL_USER: root
          MYSQL_PWD: root
          CODEGEN_DB_NAME: ruoyi-vue-pro
          CODEGEN_OUTPUT_DIR: ${{ github.workspace }}/out/generated
          CODEGEN_BASE_PACKAGE: cn.iocoder.yudao
          CODEGEN_MODULES: ${{ github.event.inputs.codegen_modules || '' }}
          CODEGEN_MODULE_NAME: ${{ github.event.inputs.codegen_module_name || '' }}
          CODEGEN_TABLE_PREFIX: ${{ github.event.inputs.codegen_table_prefix || '' }}
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: |
          set -x
          echo "CODEGEN_OUTPUT_DIR=${CODEGEN_OUTPUT_DIR}"
          echo "== before run =="
          ls -la "${GITHUB_WORKSPACE}" || true
          ls -la "${GITHUB_WORKSPACE}/out" || true
          bash tools/codegen/run.sh

      - name: Debug after codegen
        if: always()
        run: |
          set +e
          echo "== run-codegen conclusion =="
          echo "${{ steps.run-codegen.conclusion }}"
          echo "== pwd/workspace =="
          pwd
          echo "${GITHUB_WORKSPACE}"
          echo "== out dir =="
          ls -la "${GITHUB_WORKSPACE}/out" || true
          echo "== generated dir =="
          ls -la "${GITHUB_WORKSPACE}/out/generated" || true
          echo "== generated files =="
          find "${GITHUB_WORKSPACE}/out/generated" -type f | sort | sed -n '1,300p' || true
          echo "== directories related to out/generated/ruoyi =="
          find "${GITHUB_WORKSPACE}" -maxdepth 5 -type d | sort | grep -E '/out|generated|ruoyi|surefire-reports' || true
          echo "== surefire reports =="
          find "${GITHUB_WORKSPACE}/ruoyi" -path '*/surefire-reports/*' -type f | sort | sed -n '1,200p' || true
          echo "== tail possible reports =="
          for f in $(find "${GITHUB_WORKSPACE}/ruoyi" -path '*/surefire-reports/*' -type f | sort | head -20); do
            echo "----- $f -----"
            sed -n '1,200p' "$f" || true
          done

      - name: Publish generated code
        if: ${{ steps.run-codegen.conclusion == 'success' }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_OWNER: ${{ env.TARGET_OWNER }}
          BACKEND_REPO: ${{ env.BACKEND_REPO }}
          FRONTEND_REPO: ${{ env.FRONTEND_REPO }}
          BACKEND_BRANCH: ${{ env.BACKEND_BRANCH }}
          FRONTEND_BRANCH: ${{ env.FRONTEND_BRANCH }}
          PUBLISH_MODE: ${{ env.PUBLISH_MODE }}
          TARGET_PRIVATE: ${{ env.TARGET_PRIVATE }}
        run: |
          set -x
          echo "== before publish =="
          ls -la "${GITHUB_WORKSPACE}/out" || true
          ls -la "${GITHUB_WORKSPACE}/out/generated" || true
          find "${GITHUB_WORKSPACE}/out/generated" -type f | sort | sed -n '1,200p' || true
          bash tools/codegen/publish.sh

      - name: Debug after publish
        if: always()
        run: |
          set +e
          echo "== publish workspace snapshot =="
          pwd
          ls -la "${GITHUB_WORKSPACE}" || true
          ls -la "${GITHUB_WORKSPACE}/out" || true
          ls -la "${GITHUB_WORKSPACE}/out/generated" || true
          ls -la "${GITHUB_WORKSPACE}/out/publish" || true
          find "${GITHUB_WORKSPACE}/out" -maxdepth 4 | sort | sed -n '1,300p' || true

      - name: Upload generated code
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: generated-code
          path: |
            ${{ github.workspace }}/out/generated
          if-no-files-found: warn
          retention-days: 7

      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: codegen-debug-files
          path: |
            ${{ github.workspace }}/out
            ${{ github.workspace }}/ruoyi/yudao-server/target/surefire-reports
          if-no-files-found: warn
          retention-days: 7
